<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#1b140c" />
<title>Return Them Home — Map</title>
<!-- Defence-in-depth: only Leaflet from unpkg may run; images limited to the
     sources this page actually uses. -->
<meta
  http-equiv="Content-Security-Policy"
  content="default-src 'self'; script-src 'self' 'unsafe-inline' https://unpkg.com; style-src 'self' 'unsafe-inline' https://unpkg.com; img-src 'self' data: https://media.britishmuseum.org https://server.arcgisonline.com; media-src 'self'; connect-src 'self'; object-src 'none'; base-uri 'none'"
/>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha384-sHL9NAb7lN7rfvG5lfHpm643Xkcjzp4jFvuavGOndn6pjVqS6ny56CAt3nsEVT4H" crossorigin="anonymous" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha384-cxOPjt7s7Iz04uaHJceBmS+qpjv2JkIHNVcuOrM+YHwZOmJGBXI00mdUXEq65HTH" crossorigin="anonymous"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #1b140c; color: #f5efe2; overflow: hidden; }
  #map { position: fixed; inset: 0; background: #cfe3ef; }

  .bar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
    display: flex; align-items: center; gap: 10px 14px; flex-wrap: wrap;
    padding: calc(env(safe-area-inset-top) + 10px) 14px 10px;
  }
  .bar .title { font-size: 24px; font-weight: 700; text-shadow: 0 1px 6px rgba(0,0,0,0.8); }
  .bar .count { font-size: 14px; color: #f5efe2; text-shadow: 0 1px 6px rgba(0,0,0,0.9), 0 0 3px rgba(0,0,0,0.9); }
  .reset-btn { font-size: 13px; font-weight: 600; color: #f5efe2; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.3); padding: 8px 14px; border-radius: 999px; white-space: nowrap; cursor: pointer; }
  .reset-btn:hover { background: rgba(0,0,0,0.6); }
  .bar .spacer { flex: 1 1 12px; }
  .ctl { display: flex; align-items: center; gap: 6px; background: rgba(0,0,0,0.35); padding: 7px 10px; border-radius: 999px; backdrop-filter: blur(6px); }
  .ctl label { font-size: 11px; color: #d8c9ad; }
  .ctl input[type="number"] { width: 64px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #fff; border-radius: 8px; padding: 6px 8px; font-size: 13px; }
  .ctl input[type="search"] { width: 150px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #fff; border-radius: 8px; padding: 7px 10px; font-size: 13px; }
  .switch-3d { font-size: 13px; font-weight: 600; text-decoration: none; color: #1a1205; background: linear-gradient(180deg,#e8b24a,#d2932a); padding: 8px 14px; border-radius: 999px; white-space: nowrap; }
  .hidden { display: none !important; }

  /* Splash: the AI end-frame still, with a button over the dome */
  #splash { position: fixed; inset: 0; z-index: 1600; background: #0b0d10 center/cover no-repeat; }
  #splash .scrim { position: absolute; inset: 0; background: radial-gradient(circle at 42% 32%, rgba(0,0,0,0) 30%, rgba(0,0,0,0.35) 100%); }
  .dome-btn {
    /* left/top are set by placeDomeBtn(), which anchors the button to the
       dome's pixel position in splash.jpg under the center/cover crop, so it
       stays on the dome at every viewport size. These are the fallback. */
    position: absolute; left: 50%; top: 30%; transform: translate(-50%, -50%);
    display: flex; flex-direction: column; align-items: center; gap: 10px;
    background: none; border: none; cursor: pointer; color: #fff;
  }
  .dome-btn .ring {
    width: 84px; height: 84px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center; font-size: 40px; color: #1a1205;
    background: radial-gradient(circle at 50% 35%, #f6d28a, #d2932a);
    border: 3px solid #fff; box-shadow: 0 4px 16px rgba(0,0,0,0.6);
    animation: pulse 1.8s ease-in-out infinite;
  }
  .dome-btn .lbl { font-size: 18px; font-weight: 700; letter-spacing: 0.02em; text-shadow: 0 2px 10px rgba(0,0,0,0.9); }
  @keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(232,178,74,0.7);} 50% { box-shadow: 0 0 0 20px rgba(232,178,74,0);} }

  /* Detonation video */
  #intro-video { position: fixed; inset: 0; z-index: 1700; width: 100%; height: 100%; object-fit: cover; background: #000; }
  #skip { position: fixed; bottom: max(20px, env(safe-area-inset-bottom)); right: 18px; z-index: 1710; font-size: 12px; color: #fff; background: rgba(0,0,0,0.45); border: 1px solid rgba(255,255,255,0.3); border-radius: 999px; padding: 8px 14px; cursor: pointer; }

  .disc-img { width: 100%; height: 100%; border-radius: 50%; border: 2px solid #e8b24a; box-shadow: 0 1px 4px rgba(0,0,0,0.6); background-color: #2a2118; background-repeat: no-repeat; }
  .leaflet-marker-icon .disc-img:hover { border-color: #fff; }

  .leaflet-popup-content { margin: 0; width: 250px !important; }
  .pc { border-radius: 12px; overflow: hidden; }
  .pc-img { width: 100%; height: 190px; background-color:#2a2118; background-repeat:no-repeat; }
  .pc-body { padding: 12px 14px 14px; color:#241c10; }
  .pc-name { font-size: 16px; font-weight: 700; line-height: 1.25; }
  .pc-origin { color: #b07d1a; font-size: 13px; font-weight: 600; margin-top: 2px; }
  .pc-meta { margin: 8px 0; font-size: 13px; color:#4a4030; line-height: 1.5; }
  .pc-meta b { color:#6a5c40; font-weight: 600; }
  .pc-desc { font-size: 12.5px; line-height: 1.45; color:#5a513f; max-height: 6.5em; overflow:auto; }
  .pc-link { display:inline-block; margin-top:10px; font-size:13px; font-weight:600; color:#b07d1a; text-decoration:none; }

  /* Country panel (browse-by-country) */
  #panel { position: fixed; left: 0; top: 0; bottom: 0; width: min(360px, 86vw); z-index: 1200;
    display: flex; flex-direction: column; background: #111418;
    border-right: 1px solid rgba(255,255,255,0.14); transform: translateX(-104%); transition: transform .25s ease; }
  #panel.open { transform: none; }
  #panel .ph { display:flex; align-items:flex-start; justify-content:space-between; padding: calc(env(safe-area-inset-top) + 14px) 16px 12px; border-bottom:1px solid rgba(255,255,255,0.1); }
  #panel .pt { font-size:18px; font-weight:700; color:#f5efe2; }
  #panel .pc2 { font-size:12px; color:#e8b24a; margin-top:3px; }
  #panel .x { background:none; border:none; color:#cfd2d6; font-size:24px; line-height:1; cursor:pointer; }
  #panel .grid { padding:12px; display:grid; grid-template-columns: repeat(3, 1fr); gap:8px; overflow:auto; }
  #panel .thumb { width:100%; aspect-ratio:1; border:1px solid rgba(255,255,255,0.14); border-radius:8px; background-color:#2a2118; background-repeat:no-repeat; cursor:pointer; padding:0; transition: transform .1s, border-color .1s; }
  #panel .thumb:hover { transform: scale(1.06); border-color:#e8b24a; }

  /* Detail card (modal) */
  #card { position: fixed; inset:0; z-index:1300; display:none; align-items:center; justify-content:center; background: rgba(0,0,0,0.55); padding:16px; }
  #card.open { display:flex; }
  #card .box { position:relative; width:min(420px,94vw); max-height:90vh; overflow:auto; background:#fff; border-radius:14px; }
  #card .ci { width:100%; height:260px; background-color:#2a2118; background-repeat:no-repeat; }
  #card .ci img { width:100%; height:100%; object-fit:cover; display:block; }
  #card .cx { position:absolute; top:8px; right:8px; width:34px; height:34px; border-radius:50%; background:rgba(0,0,0,0.5); color:#fff; border:none; font-size:22px; cursor:pointer; z-index:2; }
  #card .cb { padding:16px 18px; color:#241c10; }
  #card .cn { font-size:20px; font-weight:700; line-height:1.25; }
  #card .co { color:#b07d1a; font-size:14px; font-weight:600; margin-top:2px; }
  #card .cm { margin:10px 0; font-size:14px; color:#4a4030; line-height:1.5; }
  #card .cm b { color:#6a5c40; }
  #card .cd { font-size:13px; line-height:1.5; color:#5a513f; }
  #card .cl { display:inline-block; margin-top:12px; font-size:14px; font-weight:600; color:#b07d1a; text-decoration:none; }
</style>
</head>
<body>
  <div id="map"></div>

  <div class="bar">
    <div>
      <div class="title">Return Them Home</div>
      <div class="count" id="count"></div>
    </div>
    <div class="spacer"></div>
    <div class="ctl hidden" id="ctl-years">
      <label>Years</label>
      <input type="number" id="yearFrom" value="-4000" step="100" inputmode="numeric" />
      <span style="color:#8a7d63">–</span>
      <input type="number" id="yearTo" value="2025" step="100" inputmode="numeric" />
    </div>
    <div class="ctl hidden" id="ctl-q"><input type="search" id="q" placeholder="Search name / country" /></div>
    <button class="reset-btn hidden" id="resetBtn">↺ Reset</button>
    <a class="switch-3d" href="../return-them-home/?full=1">🌐 3D Globe</a>
  </div>

  <!-- Intro: end-frame still with a button over the dome -->
  <div id="splash" style="background-image:url(splash.jpg)">
    <div class="scrim"></div>
    <button class="dome-btn" id="domeBtn">
      <span class="ring">🏛️</span>
      <span class="lbl">Press Button To Release</span>
    </button>
  </div>

  <!-- 5-second detonation video (plays on press) -->
  <video id="intro-video" class="hidden" playsinline preload="auto" poster="splash.jpg" src="intro.mp4"></video>
  <button id="skip" class="hidden">Skip ›</button>

  <!-- Country panel: thumbnail grid of a searched country's collection -->
  <div id="panel">
    <div class="ph">
      <div><div class="pt" id="panelTitle"></div><div class="pc2" id="panelCount"></div></div>
      <button class="x" id="panelClose" aria-label="Close">×</button>
    </div>
    <div class="grid" id="panelGrid"></div>
  </div>

  <!-- Detail card -->
  <div id="card">
    <div class="box">
      <button class="cx" id="cardClose" aria-label="Close">×</button>
      <div class="ci"><img id="cardImg" alt="" /></div>
      <div class="cb">
        <div class="cn" id="cardName"></div>
        <div class="co" id="cardOrigin"></div>
        <div class="cm" id="cardMeta"></div>
        <div class="cd" id="cardDesc"></div>
        <a class="cl" id="cardLink" target="_blank" rel="noopener">View at the British Museum ↗</a>
      </div>
    </div>
  </div>

  <script>
    const ATLAS_N = 32;
    const MAX_MARKERS = 450;
    let ALL = [];
    let started = false;

    const map = L.map('map', { zoomControl: false, attributionControl: false, worldCopyJump: true })
      .setView([25, 12], 3);
    L.control.zoom({ position: 'bottomright' }).addTo(map);
    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Topo_Map/MapServer/tile/{z}/{y}/{x}', { maxZoom: 18 }).addTo(map);

    const esc = (s) => String(s == null ? '' : s).replace(/[&<>"']/g, (c) => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
    // https-only guard for links/images built from data fields, so a poisoned
    // record can't smuggle a javascript: URL into an href or src.
    const httpsOnly = (u) => (u && /^https:\/\//i.test(u) ? u : '');
    const dateText = (a) => a.date_text || (a.year == null ? 'Unknown' : (a.year < 0 ? Math.abs(a.year) + ' BC' : a.year + ' AD'));

    function thumbBg(a) {
      if (!a.atlas) return '';
      // Coerce to numbers so data values can never break out of the style attr.
      const x = +a.atlas.u * ATLAS_N / (ATLAS_N - 1) * 100;
      const y = +a.atlas.v * ATLAS_N / (ATLAS_N - 1) * 100;
      const idx = +a.atlas.atlas_index;
      if (!Number.isFinite(x) || !Number.isFinite(y) || !Number.isFinite(idx)) return '';
      return `background-image:url(atlas/atlas_${idx}.jpg);background-size:${ATLAS_N * 100}% ${ATLAS_N * 100}%;background-position:${x}% ${y}%;`;
    }
    function discIcon(a) {
      return L.divIcon({ className: '', html: `<div class="disc-img" style="${thumbBg(a)}"></div>`, iconSize: [32, 32], iconAnchor: [16, 16], popupAnchor: [0, -14] });
    }
    function popupHtml(a) {
      const url = httpsOnly(a.image_source_url || a.image_url);
      const img = httpsOnly(a.image_url);
      return `<div class="pc"><div class="pc-img" style="${thumbBg(a)}">${img ? `<img src="${esc(img)}" alt="" style="width:100%;height:100%;object-fit:cover;display:block" onerror="this.remove()">` : ''}</div><div class="pc-body">
        <div class="pc-name">${esc(a.name)}</div><div class="pc-origin">${esc(a.origin)}</div>
        <div class="pc-meta"><b>Date:</b> ${esc(dateText(a))}${a.material ? `<br><b>Material:</b> ${esc(a.material)}` : ''}${a.museum_number ? `<br><b>Museum no.:</b> ${esc(a.museum_number)}` : ''}</div>
        ${a.description ? `<div class="pc-desc">${esc(a.description)}</div>` : ''}
        ${url ? `<a class="pc-link" href="${esc(url)}" target="_blank" rel="noopener">View at the British Museum ↗</a>` : ''}
      </div></div>`;
    }

    // ---- Country panel + detail card (browse a searched country) ----
    const COUNTRIES = new Map();
    const panel = document.getElementById('panel');
    const card = document.getElementById('card');
    const hidePanel = () => panel.classList.remove('open');
    document.getElementById('panelClose').onclick = hidePanel;
    document.getElementById('cardClose').onclick = () => card.classList.remove('open');
    card.addEventListener('click', (e) => { if (e.target === card) card.classList.remove('open'); });

    function openCountry(name) {
      const items = COUNTRIES.get(name) || [];
      document.getElementById('panelTitle').textContent = name;
      document.getElementById('panelCount').textContent =
        items.length + ' object' + (items.length === 1 ? '' : 's') + ' — tap one for details';
      const grid = document.getElementById('panelGrid');
      grid.innerHTML = '';
      for (const a of items) {
        const b = document.createElement('button');
        b.className = 'thumb'; b.title = a.name; b.style.cssText = thumbBg(a);
        b.onclick = () => openDetail(a);
        grid.appendChild(b);
      }
      panel.classList.add('open');
    }

    function openDetail(a) {
      const ci = document.querySelector('#card .ci');
      ci.style.cssText = thumbBg(a); // atlas-tile fallback behind the photo
      const img = document.getElementById('cardImg');
      img.onerror = () => { img.style.display = 'none'; };
      const photo = httpsOnly(a.image_url);
      if (photo) { img.style.display = ''; img.src = photo; }
      else { img.style.display = 'none'; img.removeAttribute('src'); }
      document.getElementById('cardName').textContent = a.name;
      document.getElementById('cardOrigin').textContent = a.origin || a.country || '';
      const rows = [['Date', dateText(a)], ['Material', a.material], ['Museum no.', a.museum_number]].filter((r) => r[1]);
      document.getElementById('cardMeta').innerHTML = rows.map((r) => `<b>${r[0]}:</b> ${esc(r[1])}`).join('<br>');
      document.getElementById('cardDesc').textContent = a.description || '';
      const link = document.getElementById('cardLink');
      const url = httpsOnly(a.image_source_url || a.image_url);
      link.style.display = url ? '' : 'none'; if (url) link.href = url;
      card.classList.add('open');
    }

    // Open the panel when the search matches a country name.
    function updatePanel() {
      const q = document.getElementById('q').value.trim().toLowerCase();
      if (!q) { hidePanel(); return; }
      const keys = [...COUNTRIES.keys()].filter((k) => k && k.toLowerCase().includes(q));
      if (keys.length) { keys.sort((a, b) => a.length - b.length); openCountry(keys[0]); }
      else hidePanel();
    }

    const layer = L.layerGroup().addTo(map);
    function render() {
      const yf = parseInt(document.getElementById('yearFrom').value) || -4000;
      const yt = parseInt(document.getElementById('yearTo').value) || 2025;
      const q = (document.getElementById('q').value || '').toLowerCase();
      let f = ALL.filter((a) => {
        const okQ = !q || a.name.toLowerCase().includes(q) || a.origin.toLowerCase().includes(q);
        const y = a.year == null ? 0 : a.year;
        return okQ && y >= yf && y <= yt;
      });
      const total = f.length;
      if (f.length > MAX_MARKERS) {
        const step = f.length / MAX_MARKERS, s = [];
        for (let i = 0; i < f.length; i += step) s.push(f[Math.floor(i)]);
        f = s.slice(0, MAX_MARKERS);
      }
      layer.clearLayers();
      for (const a of f) {
        const m = L.marker([a.lat, a.lng], { icon: discIcon(a) });
        m.bindPopup(() => popupHtml(a), { maxWidth: 250, minWidth: 250 });
        layer.addLayer(m);
      }
      document.getElementById('count').textContent =
        total > f.length ? `${f.length.toLocaleString()} of ${total.toLocaleString()} in range` : `${f.length.toLocaleString()} shown`;
    }

    // ---- Intro sequence: press dome -> play detonation -> reveal map ----
    const splash = document.getElementById('splash');
    const video = document.getElementById('intro-video');
    const skip = document.getElementById('skip');

    function reveal() {
      if (started) return;
      started = true;
      video.pause();
      video.classList.add('hidden');
      skip.classList.add('hidden');
      splash.classList.add('hidden');
      document.getElementById('ctl-years').classList.remove('hidden');
      document.getElementById('ctl-q').classList.remove('hidden');
      document.getElementById('resetBtn').classList.remove('hidden');
      render(); // discs where they landed
    }

    function resetApp() {
      started = false;
      video.pause();
      video.currentTime = 0;
      video.classList.add('hidden');
      skip.classList.add('hidden');
      document.getElementById('ctl-years').classList.add('hidden');
      document.getElementById('ctl-q').classList.add('hidden');
      document.getElementById('resetBtn').classList.add('hidden');
      document.getElementById('panel').classList.remove('open');
      document.getElementById('card').classList.remove('open');
      document.getElementById('yearFrom').value = -4000;
      document.getElementById('yearTo').value = 2025;
      document.getElementById('q').value = '';
      layer.clearLayers();
      splash.classList.remove('hidden');
    }

    function play() {
      splash.classList.add('hidden');
      video.classList.remove('hidden');
      skip.classList.remove('hidden');
      let done = false;
      const finish = () => { if (!done) { done = true; reveal(); } };
      video.onended = finish;
      video.onerror = finish;               // no video file -> straight to map
      setTimeout(finish, 8000);             // safety fallback
      try {
        const p = video.play();
        if (p && p.catch) p.catch(() => { video.muted = true; video.play().catch(finish); });
      } catch (e) { finish(); }
    }
    // Pin the button to the dome in splash.jpg. The splash uses
    // background: center/cover, so a point (ix, iy) in the 1280x720 image maps
    // to viewport centre + (point - image centre) * cover scale. (645, 132) is
    // the hand-tuned dome spot (the old 42% + 107px/-84px offsets at 1280x720).
    const domeBtn = document.getElementById('domeBtn');
    function placeDomeBtn() {
      const iw = 1280, ih = 720, ix = 653, iy = 132;
      const s = Math.max(innerWidth / iw, innerHeight / ih);
      domeBtn.style.left = (innerWidth / 2 + (ix - iw / 2) * s) + 'px';
      domeBtn.style.top = (innerHeight / 2 + (iy - ih / 2) * s) + 'px';
    }
    placeDomeBtn();
    addEventListener('resize', placeDomeBtn);

    domeBtn.addEventListener('click', play);
    skip.addEventListener('click', reveal);
    video.addEventListener('click', reveal);
    document.getElementById('resetBtn').addEventListener('click', resetApp);

    let t;
    const onChange = () => { clearTimeout(t); t = setTimeout(() => { render(); updatePanel(); }, 200); };
    ['yearFrom', 'yearTo', 'q'].forEach((id) => {
      const el = document.getElementById(id);
      el.addEventListener('input', onChange);
      el.addEventListener('change', onChange);
    });

    fetch('artifacts.json').then((r) => r.json()).then((raw) => {
      ALL = raw.map((a) => ({
        name: a.name || 'Object', origin: a.origin || a.origin_country || '',
        country: a.origin_country || a.origin || 'Unknown',
        lat: a.lat, lng: a.lng, year: typeof a.year === 'number' ? a.year : null,
        material: a.material || '', date_text: a.date_text || '', description: a.description || '',
        image_url: a.image_url || '', image_source_url: a.image_source_url || '',
        museum_number: a.museum_number || '', atlas: a.atlas,
      })).filter((a) => typeof a.lat === 'number' && typeof a.lng === 'number' && a.atlas);
      for (const a of ALL) {
        if (!COUNTRIES.has(a.country)) COUNTRIES.set(a.country, []);
        COUNTRIES.get(a.country).push(a);
      }
    }).catch((e) => console.error('load failed', e));
  </script>
</body>
</html>
