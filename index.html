<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#1b140c" />
<title>Return Them Home — Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #1b140c; color: #f5efe2; overflow: hidden; }
  #map { position: fixed; inset: 0; background: #cfe3ef; }

  .bar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
    display: flex; align-items: center; gap: 10px 14px; flex-wrap: wrap;
    padding: calc(env(safe-area-inset-top) + 10px) 14px 10px;
    background: linear-gradient(180deg, rgba(20,15,8,0.94), rgba(20,15,8,0.0));
  }
  .bar .title { font-size: 17px; font-weight: 700; text-shadow: 0 1px 6px rgba(0,0,0,0.8); }
  .bar .count { font-size: 12px; color: #d8c9ad; }
  .bar .spacer { flex: 1 1 12px; }
  .ctl { display: flex; align-items: center; gap: 6px; background: rgba(0,0,0,0.35); padding: 7px 10px; border-radius: 999px; backdrop-filter: blur(6px); }
  .ctl label { font-size: 11px; color: #d8c9ad; }
  .ctl input[type="number"] { width: 64px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #fff; border-radius: 8px; padding: 6px 8px; font-size: 13px; }
  .ctl input[type="search"] { width: 150px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #fff; border-radius: 8px; padding: 7px 10px; font-size: 13px; }
  .switch-3d { font-size: 13px; font-weight: 600; text-decoration: none; color: #1a1205; background: linear-gradient(180deg,#e8b24a,#d2932a); padding: 8px 14px; border-radius: 999px; white-space: nowrap; }
  .hidden { display: none !important; }

  /* Splash: the AI end-frame still, with a button over the dome */
  #splash { position: fixed; inset: 0; z-index: 1600; background: #0b0d10 center/cover no-repeat; }
  #splash .scrim { position: absolute; inset: 0; background: radial-gradient(circle at 42% 32%, rgba(0,0,0,0) 30%, rgba(0,0,0,0.35) 100%); }
  .dome-btn {
    position: absolute; left: 42%; top: 30%; transform: translate(-50%, -50%);
    display: flex; flex-direction: column; align-items: center; gap: 10px;
    background: none; border: none; cursor: pointer; color: #fff;
  }
  .dome-btn .ring {
    width: 84px; height: 84px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center; font-size: 34px; color: #1a1205;
    background: radial-gradient(circle at 50% 35%, #f6d28a, #d2932a);
    border: 3px solid #fff; box-shadow: 0 4px 16px rgba(0,0,0,0.6);
    animation: pulse 1.8s ease-in-out infinite;
  }
  .dome-btn .lbl { font-size: 14px; font-weight: 700; letter-spacing: 0.02em; text-shadow: 0 2px 10px rgba(0,0,0,0.9); }
  @keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(232,178,74,0.7);} 50% { box-shadow: 0 0 0 20px rgba(232,178,74,0);} }

  /* Detonation video */
  #intro-video { position: fixed; inset: 0; z-index: 1700; width: 100%; height: 100%; object-fit: cover; background: #000; }
  #skip { position: fixed; bottom: max(20px, env(safe-area-inset-bottom)); right: 18px; z-index: 1710; font-size: 12px; color: #fff; background: rgba(0,0,0,0.45); border: 1px solid rgba(255,255,255,0.3); border-radius: 999px; padding: 8px 14px; cursor: pointer; }

  .disc-img { width: 100%; height: 100%; border-radius: 50%; border: 2px solid #e8b24a; box-shadow: 0 1px 4px rgba(0,0,0,0.6); background-color: #2a2118; background-repeat: no-repeat; }
  .leaflet-marker-icon .disc-img:hover { border-color: #fff; }

  .leaflet-popup-content { margin: 0; width: 250px !important; }
  .pc { border-radius: 12px; overflow: hidden; }
  .pc-img { width: 100%; height: 190px; background-color:#2a2118; background-repeat:no-repeat; }
  .pc-body { padding: 12px 14px 14px; color:#241c10; }
  .pc-name { font-size: 16px; font-weight: 700; line-height: 1.25; }
  .pc-origin { color: #b07d1a; font-size: 13px; font-weight: 600; margin-top: 2px; }
  .pc-meta { margin: 8px 0; font-size: 13px; color:#4a4030; line-height: 1.5; }
  .pc-meta b { color:#6a5c40; font-weight: 600; }
  .pc-desc { font-size: 12.5px; line-height: 1.45; color:#5a513f; max-height: 6.5em; overflow:auto; }
  .pc-link { display:inline-block; margin-top:10px; font-size:13px; font-weight:600; color:#b07d1a; text-decoration:none; }
</style>
</head>
<body>
  <div id="map"></div>

  <div class="bar">
    <div>
      <div class="title">Return Them Home</div>
      <div class="count" id="count"></div>
    </div>
    <div class="spacer"></div>
    <div class="ctl hidden" id="ctl-years">
      <label>Years</label>
      <input type="number" id="yearFrom" value="-4000" step="100" inputmode="numeric" />
      <span style="color:#8a7d63">–</span>
      <input type="number" id="yearTo" value="2025" step="100" inputmode="numeric" />
    </div>
    <div class="ctl hidden" id="ctl-q"><input type="search" id="q" placeholder="Search name / country" /></div>
    <a class="switch-3d" href="../return-them-home/?full=1">🌐 3D Globe</a>
  </div>

  <!-- Intro: end-frame still with a button over the dome -->
  <div id="splash" style="background-image:url(splash.jpg)">
    <div class="scrim"></div>
    <button class="dome-btn" id="domeBtn">
      <span class="ring">▶</span>
      <span class="lbl">Press to release the collection</span>
    </button>
  </div>

  <!-- 5-second detonation video (plays on press) -->
  <video id="intro-video" class="hidden" playsinline preload="auto" src="intro.mp4"></video>
  <button id="skip" class="hidden">Skip ›</button>

  <script>
    const ATLAS_N = 32;
    const MAX_MARKERS = 450;
    let ALL = [];
    let started = false;

    const map = L.map('map', { zoomControl: false, attributionControl: false, worldCopyJump: true })
      .setView([25, 12], 3);
    L.control.zoom({ position: 'bottomright' }).addTo(map);
    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Topo_Map/MapServer/tile/{z}/{y}/{x}', { maxZoom: 18 }).addTo(map);

    const esc = (s) => String(s == null ? '' : s).replace(/[&<>"]/g, (c) => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;' }[c]));
    const dateText = (a) => a.date_text || (a.year == null ? 'Unknown' : (a.year < 0 ? Math.abs(a.year) + ' BC' : a.year + ' AD'));

    function thumbBg(a) {
      if (!a.atlas) return '';
      const x = a.atlas.u * ATLAS_N / (ATLAS_N - 1) * 100;
      const y = a.atlas.v * ATLAS_N / (ATLAS_N - 1) * 100;
      return `background-image:url(atlas/atlas_${a.atlas.atlas_index}.jpg);background-size:${ATLAS_N * 100}% ${ATLAS_N * 100}%;background-position:${x}% ${y}%;`;
    }
    function discIcon(a) {
      return L.divIcon({ className: '', html: `<div class="disc-img" style="${thumbBg(a)}"></div>`, iconSize: [32, 32], iconAnchor: [16, 16], popupAnchor: [0, -14] });
    }
    function popupHtml(a) {
      const url = a.image_source_url || a.image_url || '';
      return `<div class="pc"><div class="pc-img" style="${thumbBg(a)};background-size:cover;"></div><div class="pc-body">
        <div class="pc-name">${esc(a.name)}</div><div class="pc-origin">${esc(a.origin)}</div>
        <div class="pc-meta"><b>Date:</b> ${esc(dateText(a))}${a.material ? `<br><b>Material:</b> ${esc(a.material)}` : ''}${a.museum_number ? `<br><b>Museum no.:</b> ${esc(a.museum_number)}` : ''}</div>
        ${a.description ? `<div class="pc-desc">${esc(a.description)}</div>` : ''}
        ${url ? `<a class="pc-link" href="${esc(url)}" target="_blank" rel="noopener">View at the British Museum ↗</a>` : ''}
      </div></div>`;
    }

    const layer = L.layerGroup().addTo(map);
    function render() {
      const yf = parseInt(document.getElementById('yearFrom').value) || -4000;
      const yt = parseInt(document.getElementById('yearTo').value) || 2025;
      const q = (document.getElementById('q').value || '').toLowerCase();
      let f = ALL.filter((a) => {
        const okQ = !q || a.name.toLowerCase().includes(q) || a.origin.toLowerCase().includes(q);
        const y = a.year == null ? 0 : a.year;
        return okQ && y >= yf && y <= yt;
      });
      const total = f.length;
      if (f.length > MAX_MARKERS) {
        const step = f.length / MAX_MARKERS, s = [];
        for (let i = 0; i < f.length; i += step) s.push(f[Math.floor(i)]);
        f = s.slice(0, MAX_MARKERS);
      }
      layer.clearLayers();
      for (const a of f) {
        const m = L.marker([a.lat, a.lng], { icon: discIcon(a) });
        m.bindPopup(() => popupHtml(a), { maxWidth: 250, minWidth: 250 });
        layer.addLayer(m);
      }
      document.getElementById('count').textContent =
        total > f.length ? `${f.length.toLocaleString()} of ${total.toLocaleString()} in range` : `${f.length.toLocaleString()} shown`;
    }

    // ---- Intro sequence: press dome -> play detonation -> reveal map ----
    const splash = document.getElementById('splash');
    const video = document.getElementById('intro-video');
    const skip = document.getElementById('skip');

    function reveal() {
      if (started) return;
      started = true;
      video.pause();
      video.classList.add('hidden');
      skip.classList.add('hidden');
      splash.classList.add('hidden');
      document.getElementById('ctl-years').classList.remove('hidden');
      document.getElementById('ctl-q').classList.remove('hidden');
      render(); // discs where they landed
    }

    function play() {
      splash.classList.add('hidden');
      video.classList.remove('hidden');
      skip.classList.remove('hidden');
      let done = false;
      const finish = () => { if (!done) { done = true; reveal(); } };
      video.onended = finish;
      video.onerror = finish;               // no video file -> straight to map
      setTimeout(finish, 8000);             // safety fallback
      try {
        const p = video.play();
        if (p && p.catch) p.catch(() => { video.muted = true; video.play().catch(finish); });
      } catch (e) { finish(); }
    }
    document.getElementById('domeBtn').addEventListener('click', play);
    skip.addEventListener('click', reveal);
    video.addEventListener('click', reveal);

    let t;
    const onChange = () => { clearTimeout(t); t = setTimeout(render, 200); };
    ['yearFrom', 'yearTo', 'q'].forEach((id) => {
      const el = document.getElementById(id);
      el.addEventListener('input', onChange);
      el.addEventListener('change', onChange);
    });

    fetch('artifacts.json').then((r) => r.json()).then((raw) => {
      ALL = raw.map((a) => ({
        name: a.name || 'Object', origin: a.origin || a.origin_country || '',
        lat: a.lat, lng: a.lng, year: typeof a.year === 'number' ? a.year : null,
        material: a.material || '', date_text: a.date_text || '', description: a.description || '',
        image_url: a.image_url || '', image_source_url: a.image_source_url || '',
        museum_number: a.museum_number || '', atlas: a.atlas,
      })).filter((a) => typeof a.lat === 'number' && typeof a.lng === 'number' && a.atlas);
    }).catch((e) => console.error('load failed', e));
  </script>
</body>
</html>
